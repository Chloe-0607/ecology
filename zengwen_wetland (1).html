<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曾文溪口：這片土地，被誰看見？</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --mud: #8B7355;
  --reed: #C4A882;
  --tide: #4A7C7E;
  --sky: #B8D4D8;
  --soil: #2C1810;
  --paper: #F7F3EC;
  --ink: #1A1612;
  --muted: #6B5E52;
  --border: rgba(139,115,85,0.2);
  --border-strong: rgba(139,115,85,0.4);
  --serif: 'Noto Serif TC', serif;
  --sans: 'Noto Sans TC', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.75;
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,243,236,0.95);
  backdrop-filter: blur(8px);
  border-bottom: 0.5px solid var(--border-strong);
  padding: 0 2rem;
  display: flex; align-items: center; gap: 0;
}

.nav-logo {
  font-family: var(--serif); font-size: 14px; font-weight: 600;
  color: var(--mud); padding: 1rem 1rem 1rem 0;
  border-right: 0.5px solid var(--border); margin-right: 1rem;
  white-space: nowrap; flex-shrink: 0;
}

.nav-modes {
  display: flex; gap: 0; flex: 1;
}

.mode-btn {
  padding: 0.7rem 1.1rem; background: none; border: none;
  font-family: var(--sans); font-size: 13px; font-weight: 400;
  color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; white-space: nowrap;
}
.mode-btn:hover { color: var(--ink); }
.mode-btn.active { color: var(--ink); font-weight: 500; border-bottom-color: var(--mud); }

/* ── HERO ── */
.hero {
  padding: 5rem 2rem 4rem;
  max-width: 860px; margin: 0 auto;
  position: relative;
}

.hero-tag {
  display: inline-block;
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 1.25rem;
  border-bottom: 0.5px solid var(--border-strong); padding-bottom: 0.4rem;
}

.hero-title {
  font-family: var(--serif); font-size: clamp(28px, 5vw, 48px);
  font-weight: 900; line-height: 1.25; margin-bottom: 1rem;
  color: var(--soil);
}

.hero-title em {
  font-style: normal; color: var(--tide);
}

.hero-body {
  font-size: 16px; line-height: 1.85; color: var(--muted);
  max-width: 580px; margin-bottom: 2.5rem;
}

.hero-stats {
  display: flex; gap: 2rem; flex-wrap: wrap;
  padding-top: 1.5rem; border-top: 0.5px solid var(--border);
}

.stat-item { }
.stat-num {
  font-family: var(--serif); font-size: 28px; font-weight: 600;
  color: var(--soil); display: block; line-height: 1;
}
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── SECTION WRAPPER ── */
.section {
  max-width: 860px; margin: 0 auto;
  padding: 0 2rem 4rem;
}

.section-title {
  font-family: var(--serif); font-size: 22px; font-weight: 600;
  color: var(--soil); margin-bottom: 0.4rem;
}

.section-sub {
  font-size: 13px; color: var(--muted); margin-bottom: 2rem;
}

.divider {
  border: none; border-top: 0.5px solid var(--border);
  margin: 0 2rem 0;
}

/* ── ERA TABS ── */
.era-tabs {
  display: flex; gap: 0; overflow-x: auto;
  scrollbar-width: none; border-bottom: 0.5px solid var(--border-strong);
  margin-bottom: 0;
}
.era-tabs::-webkit-scrollbar { display: none; }

.era-tab {
  padding: 0.9rem 1.25rem; background: none; border: none;
  font-family: var(--sans); font-size: 13px; color: var(--muted);
  cursor: pointer; white-space: nowrap; border-bottom: 2.5px solid transparent;
  transition: all 0.2s; flex-shrink: 0;
}
.era-tab:hover { color: var(--ink); background: rgba(139,115,85,0.05); }
.era-tab.active { color: var(--ink); font-weight: 500; }

.era-year-label { font-size: 10px; display: block; margin-top: 2px; opacity: 0.65; }

/* ── ERA CONTENT ── */
.era-content { padding: 2rem 0; }

.era-header {
  display: grid; grid-template-columns: auto 1fr;
  gap: 1.25rem; align-items: start;
  padding-bottom: 1.5rem; margin-bottom: 1.5rem;
  border-bottom: 0.5px solid var(--border);
}

.era-glyph {
  width: 52px; height: 52px;
  border: 0.5px solid var(--border-strong);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; background: white; flex-shrink: 0;
}

.era-meta {}
.era-period { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.era-name { font-family: var(--serif); font-size: 20px; font-weight: 600; line-height: 1.3; color: var(--soil); }
.era-place { font-size: 13px; color: var(--muted); margin-top: 3px; }

.quote-block {
  border-left: 3px solid var(--reed);
  padding: 0.9rem 1.25rem;
  margin-bottom: 1.75rem;
  background: rgba(196,168,130,0.08);
  border-radius: 0 4px 4px 0;
}
.quote-source { font-size: 11px; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.05em; }
.quote-text { font-family: var(--serif); font-size: 15px; line-height: 1.8; }

.layer-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 12px; margin-bottom: 1.5rem;
}

.layer-card {
  background: white; border: 0.5px solid var(--border);
  border-radius: 8px; padding: 1rem 1.1rem;
}

.layer-tag {
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 0.5rem;
}

.layer-main { font-size: 14px; line-height: 1.6; color: var(--ink); margin-bottom: 0.35rem; }
.layer-detail { font-size: 12.5px; color: var(--muted); line-height: 1.6; }

.forgotten-row {
  padding: 0.8rem 1rem; border: 0.5px solid var(--border);
  border-radius: 6px; background: rgba(139,115,85,0.04);
}
.forgotten-label { font-size: 11px; color: var(--muted); margin-bottom: 0.5rem; letter-spacing: 0.08em; text-transform: uppercase; }
.forgotten-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.forgotten-chip {
  font-size: 12px; color: var(--muted); padding: 3px 10px;
  border: 0.5px solid var(--border-strong);
  border-radius: 99px; background: white;
  text-decoration: line-through; text-decoration-color: var(--reed);
}

/* ── TIMELINE ── */
.timeline-track {
  display: flex; align-items: center; gap: 0;
  padding: 1.5rem 0 2.5rem;
  overflow-x: auto; scrollbar-width: none;
}
.timeline-track::-webkit-scrollbar { display: none; }

.tl-node {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; cursor: pointer; flex-shrink: 0; padding: 0 4px;
}
.tl-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  background: var(--paper); transition: all 0.2s;
}
.tl-node:hover .tl-dot { background: var(--reed); border-color: var(--reed); }
.tl-node.active .tl-dot { transform: scale(1.5); background: var(--mud); border-color: var(--mud); }
.tl-label { font-size: 10px; color: var(--muted); white-space: nowrap; }

.tl-line { flex: 1; height: 0.5px; background: var(--border-strong); min-width: 20px; }

/* ── SPECIES VIEW ── */
.species-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 2rem;
}

.species-card {
  background: white; border: 0.5px solid var(--border);
  border-radius: 8px; padding: 1.1rem;
  cursor: pointer; transition: all 0.2s;
}
.species-card:hover { border-color: var(--border-strong); background: var(--paper); }
.species-card.active { border-width: 1.5px; }

.species-icon {
  width: 48px; height: 48px; margin-bottom: 0.75rem;
}

.species-name { font-family: var(--serif); font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.species-latin { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 0.5rem; }
.species-status-chip {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 99px; border: 0.5px solid;
}

.species-detail {
  background: white; border: 0.5px solid var(--border);
  border-radius: 8px; padding: 1.5rem 1.75rem;
  margin-bottom: 1.5rem; display: none;
}
.species-detail.visible { display: block; }

.species-voice {
  font-family: var(--serif); font-size: 17px; line-height: 1.85;
  color: var(--soil); margin-bottom: 1.5rem;
  padding: 1rem 1.25rem;
  border-left: 3px solid;
  border-radius: 0 4px 4px 0;
}

.species-timeline {
  display: flex; flex-direction: column; gap: 0;
  border: 0.5px solid var(--border); border-radius: 6px; overflow: hidden;
}

.sp-era-row {
  display: grid; grid-template-columns: 110px 1fr;
  border-bottom: 0.5px solid var(--border);
}
.sp-era-row:last-child { border-bottom: none; }

.sp-era-label {
  padding: 0.7rem 0.9rem;
  font-size: 12px; color: var(--muted);
  border-right: 0.5px solid var(--border);
  background: rgba(139,115,85,0.04);
  display: flex; align-items: center;
}

.sp-era-event {
  padding: 0.7rem 1rem; font-size: 13.5px; line-height: 1.6;
  display: flex; align-items: center; gap: 0.5rem;
}

.sp-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0;
}

.population-bar-wrap {
  margin-top: 1.25rem;
  padding: 1rem 1.1rem; border: 0.5px solid var(--border);
  border-radius: 6px; background: rgba(139,115,85,0.03);
}
.pop-label { font-size: 12px; color: var(--muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
.pop-bars { display: flex; flex-direction: column; gap: 8px; }
.pop-row { display: flex; align-items: center; gap: 10px; }
.pop-era { font-size: 12px; color: var(--muted); width: 80px; flex-shrink: 0; }
.pop-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.pop-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.pop-val { font-size: 12px; color: var(--muted); width: 50px; text-align: right; flex-shrink: 0; }

/* ── FOOTER ── */
footer {
  border-top: 0.5px solid var(--border-strong);
  padding: 2rem;
  text-align: center;
  font-size: 12px; color: var(--muted);
}

/* ── FADE ANIMATION ── */
.fade { animation: fadeUp 0.3s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  nav { padding: 0 1rem; }
  .hero { padding: 3rem 1rem 2rem; }
  .section { padding: 0 1rem 3rem; }
  .mode-btn { padding: 0.7rem 0.75rem; font-size: 12px; }
  .divider { margin: 0 1rem 0; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">曾文溪口</div>
  <div class="nav-modes">

</div>

<hr class="divider">

<!-- ══ ERA VIEW ══ -->
<div class="view active" id="view-era">

<!-- ══ SPECIES VIEW ══ -->
<div class="view" id="view-species">

    </div>

    <div class="species-grid" id="speciesGrid"></div>
    <div class="species-detail" id="speciesDetail"></div>
  </div>
</div>

<footer>
  資料參考：黑面琵鷺保育學會、台灣歷史博物館、嘉南農田水利會史料
</footer>

let currentEra = 0;
let currentSpecies = null;

/* ═══════════════════════════════
   VIEW SWITCH
═══════════════════════════════ */
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('btn-' + view).classList.add('active');
}

/* ═══════════════════════════════
   ERA RENDERING
═══════════════════════════════ */
function renderEraTabs() {
  const container = document.getElementById('eraTabs');
  container.innerHTML = eras.map((e, i) => `
    <button class="era-tab ${i === currentEra ? 'active' : ''}"
      style="${i === currentEra ? `border-bottom-color:${e.accent}` : ''}"
      onclick="switchEra(${i})">
      ${e.label}
      <span class="era-year-label">${e.year}</span>
    </button>
  `).join('');
}

function renderEraContent() {
  const e = eras[currentEra];
  const container = document.getElementById('eraContent');
  container.innerHTML = `<div class="fade">
    <div class="era-header">
      <div class="era-glyph">${e.glyph}</div>
      <div class="era-meta">
        <div class="era-period">${e.year}</div>
        <div class="era-name">${e.label}</div>
        <div class="era-place">${e.land}</div>
      </div>
    </div>
    <div class="quote-block" style="border-left-color:${e.accent}">
      <div class="quote-source">${e.quote.src}</div>
      <div class="quote-text">「${e.quote.text}」</div>
    </div>
    <div class="layer-grid">
      ${e.layers.map(l => `
        <div class="layer-card">
          <div class="layer-tag" style="color:${l.color}">${l.tag}</div>
          <div class="layer-main">${l.main}</div>
          <div class="layer-detail">${l.detail}</div>
        </div>
      `).join('')}
    </div>
    <div class="forgotten-row">
      <div class="forgotten-label">這個時代遺忘了……</div>
      <div class="forgotten-chips">
        ${e.forgotten.map(f => `<span class="forgotten-chip">${f}</span>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderTimeline() {
  const container = document.getElementById('timelineTrack');
  let html = '';
  eras.forEach((e, i) => {
    html += `<div class="tl-node ${i === currentEra ? 'active' : ''}" onclick="switchEra(${i})">
      <div class="tl-dot" style="${i === currentEra ? `background:${e.accent};border-color:${e.accent}` : ''}"></div>
      <div class="tl-label">${e.year.split('–')[0].replace('～','')}</div>
    </div>`;
    if (i < eras.length - 1) html += `<div class="tl-line"></div>`;
  });
  container.innerHTML = html;
}

function switchEra(i) {
  currentEra = i;
  renderEraTabs();
  renderEraContent();
  renderTimeline();
}

/* ═══════════════════════════════
   SPECIES RENDERING
═══════════════════════════════ */
function renderSpeciesGrid() {
  const container = document.getElementById('speciesGrid');
  container.innerHTML = species.map((s, i) => `
    <div class="species-card ${currentSpecies === i ? 'active' : ''}"
      style="${currentSpecies === i ? `border-color:${s.accent}` : ''}"
      onclick="selectSpecies(${i})">
      <svg class="species-icon" viewBox="0 0 48 48">${s.icon.replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>
      <div class="species-name" style="${currentSpecies === i ? `color:${s.accent}` : ''}">${s.name}</div>
      <div class="species-latin">${s.latin}</div>
      <span class="species-status-chip"
        style="color:${s.statusColor};border-color:${s.statusColor};background:${s.statusBg}">
        ${s.status}
      </span>
    </div>
  `).join('');
}

function renderSpeciesDetail(idx) {
  const s = species[idx];
  const detail = document.getElementById('speciesDetail');
  const voiceLines = s.voice.split('\n\n').map(p => `<p style="margin-bottom:1rem">${p}</p>`).join('');

  detail.innerHTML = `<div class="fade">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--border)">
      <svg style="width:52px;height:52px;flex-shrink:0" viewBox="0 0 48 48">
        ${s.icon.replace(/<svg[^>]*>/,'').replace('</svg>','')}
      </svg>
      <div>
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">${s.latin}</div>
        <div style="font-family:var(--serif);font-size:22px;font-weight:600;color:var(--soil)">${s.name}</div>
        <span class="species-status-chip" style="color:${s.statusColor};border-color:${s.statusColor};background:${s.statusBg};margin-top:4px;display:inline-block">${s.statusLabel}</span>
      </div>
    </div>

    <div class="species-voice" style="border-left-color:${s.accent}">${voiceLines}</div>

    <div style="margin-bottom:1.5rem">
      <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem">各時代處境</div>
      <div class="species-timeline">
        ${s.timeline.map(t => `
          <div class="sp-era-row">
            <div class="sp-era-label">${t.era}</div>
            <div class="sp-era-event">
              <span class="sp-status-dot" style="background:${t.color}"></span>
              ${t.event}
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="population-bar-wrap">
      <div class="pop-label">族群變化趨勢</div>
      <div class="pop-bars">
        ${s.popBars.map(b => `
          <div class="pop-row">
            <div class="pop-era">${b.era}</div>
            <div class="pop-track">
              <div class="pop-fill" style="width:${b.pct}%;background:${s.accent}"></div>
            </div>
            <div class="pop-val">${b.val}</div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;

  detail.classList.add('visible');
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectSpecies(idx) {
  if (currentSpecies === idx) {
    currentSpecies = null;
    document.getElementById('speciesDetail').classList.remove('visible');
    renderSpeciesGrid();
    return;
  }
  currentSpecies = idx;
  renderSpeciesGrid();
  renderSpeciesDetail(idx);
}
